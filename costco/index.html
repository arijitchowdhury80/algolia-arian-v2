let currentFilter = 'all';



function filterSignals(type) {

  currentFilter = type;

  document.querySelectorAll('.filter-btn').forEach(btn => {

    btn.classList.toggle('active', btn.dataset.filter === type);

    card.style.display = show ? 'block' : 'none';

function initLightbox() {

  const lb    = document.getElementById('lightbox');

  const img   = document.getElementById('lightbox-img');

  const cap   = document.getElementById('lightbox-caption');

  const close = document.getElementById('lightbox-close');



  document.querySelectorAll('.finding-screenshot').forEach(wrap => {

    wrap.addEventListener('click', () => {

      const i = wrap.querySelector('img');

      if (!i) return;

      img.src = i.src;

      img.alt = i.alt;

      cap.textContent = i.dataset.caption || i.alt || '';

      lb.classList.add('open');

      document.body.style.overflow = 'hidden';

    });

  });



  const closeLb = () => { lb.classList.remove('open'); document.body.style.overflow = ''; img.src = ''; };

  close.addEventListener('click', closeLb);

  lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

}

// Translated from 21st.dev AnimatedGradient (React) → vanilla JS/CSS

// Generates animated SVG blob circles with random CSS custom-property translate paths

function gradientBlobs(colors, speed = 14, opacity = 0.28) {

  const r = () => (Math.random() - 0.5).toFixed(3);

  const pct = () => (20 + Math.random() * 55).toFixed(1);

  const sz = () => (70 + Math.random() * 90).toFixed(0);

  const blobs = colors.map((color, i) => {

    const delay = (i * (speed / colors.length)).toFixed(1);

    const size = sz();

    return `<div class="cs-blob" style="

      top:${pct()}%;left:${pct()}%;

      width:${size}px;height:${size}px;

      --cs-speed:${speed}s;

      animation-delay:-${delay}s;

      --tx-1:${r()};--ty-1:${r()};

      --tx-2:${r()};--ty-2:${r()};

      --tx-3:${r()};--ty-3:${r()};

      --tx-4:${r()};--ty-4:${r()};

    "><svg width="100%" height="100%" viewBox="0 0 100 100" aria-hidden="true">

      <circle cx="50" cy="50" r="50" fill="${color}" opacity="${opacity}"/>

    </svg></div>`;

  }).join('');

  return `<div class="cs-blob-layer">${blobs}</div>`;

}

function sectionTraffic(D) {

  const t = D.traffic || {};

  const channels = t.top_channels || [];

  const maxShare = Math.max(...channels.map(c => parseFloat(c.share) || 0), 1);

  const audience = t.audience || {};

  const age = audience.age || {};

  const gender = audience.gender || {};

  const maxAge = Math.max(...Object.values(age).map(Number), 1);



  // ── Build donut segments (top 4 + Other) ─────────────────────────────────

  const DONUT_KEYS = ['Direct','Organic Search','Paid Search','Social'];

  const DONUT_COLORS = {

    'Direct':'var(--blue)','Organic Search':'var(--green)','Paid Search':'var(--amber)',

    'Social':'var(--violet)','Other':'var(--chart-other)'

  };

  const donutData = []; let otherPct = 0;

  channels.forEach(c => {

    const nm = c.source || c.channel || '';

    const pct = parseFloat(c.share) || 0;

    if (DONUT_KEYS.includes(nm)) donutData.push({name:nm, pct, color:DONUT_COLORS[nm]});

    else otherPct += pct;

  });

  if (otherPct > 0.05) donutData.push({name:'Other', pct:Math.round(otherPct*10)/10, color:DONUT_COLORS['Other']});



  // ── Algolia angle: search % ───────────────────────────────────────────────

  const searchPct = donutData.filter(d=>['Organic Search','Paid Search'].includes(d.name))

    .reduce((s,d)=>s+d.pct, 0);

  const searchPctStr = Math.round(searchPct*10)/10;



  // ── SVG arc path helper ───────────────────────────────────────────────────

  const cx=110, cy=110, outerR=90, innerR=56;

  const toRad = deg => deg * Math.PI / 180;

  const arcPath = (s, e) => {

    const large = (e-s) > 180 ? 1 : 0;

    const [os,oe,is,ie] = [s,e,s,e].map((d,i) => {

      const r = i<2 ? outerR : innerR;

      return [cx+r*Math.cos(toRad(d)), cy+r*Math.sin(toRad(d))];

    });

    return `M${os[0]},${os[1]} A${outerR},${outerR} 0 ${large},1 ${oe[0]},${oe[1]} L${ie[0]},${ie[1]} A${innerR},${innerR} 0 ${large},0 ${is[0]},${is[1]}Z`;

  };



  // ── Build SVG segments ────────────────────────────────────────────────────

  const svgId = `traffic-donut-${Math.random().toString(36).slice(2,7)}`;

  let angle = -90;

  const segHtml = donutData.map((d, idx) => {

    const sweep = (d.pct / 100) * 360;

    const endAngle = angle + sweep;

    const mid = angle + sweep / 2;

    const tx = Math.cos(toRad(mid)) * 11;

    const ty = Math.sin(toRad(mid)) * 11;

    const path = arcPath(angle, endAngle - 0.3); // tiny gap between segments

    angle = endAngle;

    return `<path class="donut-seg" d="${path}" fill="${d.color}"

      data-name="${escHtml(d.name)}" data-pct="${d.pct}"

      data-tx="${tx.toFixed(2)}" data-ty="${ty.toFixed(2)}" data-idx="${idx}"/>`;

  }).join('');



  const legendHtml = donutData.map((d, idx) => `

    <div data-legend="${svgId}-${idx}"

         style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:default;transition:font-weight 0.1s;">

      <span style="width:10px;height:10px;border-radius:50%;background:${d.color};flex-shrink:0;display:inline-block;"></span>

      <span style="${T.bodySmMid14};flex:1;">${escHtml(d.name)}</span>

      <span style="${T.bodySmGray12};font-weight:600;color:${d.color};">${d.pct}%</span>

    </div>`).join('');



  return `<section id="section-traffic" class="audit-section">

    <div class="section-eyebrow">Company Intelligence · Traffic ${srcTag('sw','SimilarWeb')}</div>

    <div class="section-title">Traffic & Digital Presence</div>

    <p class="section-desc">Data as of ${s(D.meta?.data_vintage?.similarweb || t.data_vintage)} · ${lnk(t.source_url, 'View in SimilarWeb')}</p>



    <!-- Row 1: 6 KPI tiles — glow effect on hover -->

    <div id="traffic-kpi-grid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:28px;">

      ${[

        { label:'Monthly Visits',  value: t.monthly_visits || D.company_snapshot?.monthly_visits },

        { label:'Avg. Visit',      value: t.visit_duration },

        { label:'Bounce Rate',     value: t.bounce_rate },

        { label:'Pages / Visit',   value: t.pages_per_visit },

        { label:'Global Rank',     value: t.global_rank ? '#' + n(t.global_rank) : null },

        { label:'Category Rank',   value: t.category_rank ? '#' + n(t.category_rank) + (t.category ? ' · ' + t.category : '') : null },

      ].filter(m => m.value).map(m => `

        <div class="metric-tile glow-card" style="border:none;">

          <div class="metric-tile__label">${m.label}</div>

          <div class="metric-tile__value" style="${T.bodySm};">${escHtml(s(m.value))}</div>

        </div>`).join('')}

    </div>



    <!-- Row 2: Two 3D shadow cards (no glow — internal interactivity takes priority) -->

    <div style="display:grid;grid-template-columns:55fr 45fr;gap:16px;align-items:stretch;">



      <!-- LEFT CARD: Interactive donut + device split — no lift (parent card lifts) -->

      <div class="card-3d" style="padding:24px;">

        <div class="section-eyebrow" style="margin-bottom:16px;">Traffic Sources</div>



        <!-- Donut + legend row -->

        <div style="display:flex;align-items:center;gap:24px;margin-bottom:24px;">

          <!-- SVG Donut -->

          <svg id="${svgId}" class="donut-chart" viewBox="0 0 220 220" width="160" height="160" style="flex-shrink:0;overflow:visible;">

            ${segHtml}

            <!-- Center text -->

            <text id="${svgId}-cp" x="110" y="103" text-anchor="middle"

              style="font-size:24px;font-weight:600;fill:var(--gray);font-family:'Sora',sans-serif;">

              ${searchPctStr}%

            </text>

            <text id="${svgId}-cs" x="110" y="122" text-anchor="middle"

              style="font-size:11px;font-weight:600;fill:var(--mid);font-family:'Sora',sans-serif;text-transform:uppercase;letter-spacing:0.08em;">

              via Search

            </text>

          </svg>

          <!-- Legend -->

          <div style="flex:1;">${legendHtml}</div>

        </div>



        <!-- Device Split — fills white space below donut (verified SimilarWeb data) -->

        ${t.device_share ? `

        <div style="border-top:1px solid var(--border);padding-top:16px;">

          <div style="${T.eyebrowSm};margin-bottom:8px;">Device Split</div>

          <div style="height:32px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:6px;">

            <div style="width:${t.device_share.mobile}%;background:var(--blue);display:flex;align-items:center;justify-content:center;">

              <span style="${T.eyebrowSmCol('white')};white-space:nowrap;padding:0 6px;">📱 ${t.device_share.mobile}%</span>

            </div>

            <div style="width:${t.device_share.desktop}%;background:var(--mid);display:flex;align-items:center;justify-content:center;">

              <span style="${T.eyebrowSmCol('white')};white-space:nowrap;padding:0 6px;">🖥 ${t.device_share.desktop}%</span>

            </div>

          </div>

          <div style="display:flex;justify-content:space-between;${T.bodySmGray12};margin-bottom:8px;">

            <span>Mobile</span><span>Desktop</span>

          </div>

          ${t.device_share.insight ? `<div style="${T.bodySm};background:rgba(0,61,255,0.05);border:1px solid rgba(0,61,255,0.12);border-radius:6px;padding:8px 10px;font-style:italic;">${escHtml(t.device_share.insight)}</div>` : ''}

        </div>` : ''}



      </div>



      <!-- RIGHT CARD: Audience Profile — no lift (parent card lifts) -->

      <div class="card-3d" style="padding:24px;">

        <div class="section-eyebrow" style="margin-bottom:16px;">Audience Profile</div>

        ${Object.keys(gender).length ? `

        <!-- Gender split bar -->

        <div style="${T.eyebrowSm};margin-bottom:8px;">Gender</div>

        <div style="position:relative;height:32px;border-radius:6px;overflow:hidden;margin-bottom:6px;display:flex;">

          ${(() => {

            return `<div style="width:${f}%;background:var(--purple);display:flex;align-items:center;justify-content:center;">

function sectionFinancials(D) {

    if (typeof r.revenue === 'number') return r.revenue;

    const m = String(r.revenue || '').replace(/[^0-9.]/g, '');

    return parseFloat(m) || 0;

  });

  const maxRev = Math.max(...revNums, 1);

  const barPcts = revNums.map(v => Math.round((v / maxRev) * 100));



  // Per-year rich content — built from revenue_3y scratchpad data

        </svg>

      </div>` : '';



    return `

    <div class="tl-node" data-tl-node>

      <div class="tl-node__label">

        <span class="tl-node__year-badge">${escHtml(r.year)}</span>

      </div>

            ${isLast ? `<span class="tl-card__cagr">${escHtml(r.note||'Latest FY')}</span>` : `<span style="${T.bodySmMid14};">${escHtml(r.note||'')}</span>`}

          </div>

          <div class="tl-metrics-row">

            <div class="tl-metric">

    const titleText = fullText.slice(0, titleEnd);

    <div class="section-title">Hiring Signals</div>

    <p class="section-desc">${hiring.length} open role${hiring.length!==1?'s':''} revealing technology investment priorities.</p>

    <div class="feature-grid" style="grid-template-columns:repeat(${cols},1fr);">

/* ═══════════════════════════════════════════════════

   SECTION: SCORE HEATMAP

═══════════════════════════════════════════════════ */

function sectionScoreHeatmap(D) {

  const sc = D.score || {};

  // Build category→finding map for TOC click targets

  const findings = D.findings || [];

  const catToFinding = {};

  findings.forEach(f => {

    if (!catToFinding[f.category]) catToFinding[f.category] = f;

  });



  // Map score breakdown key → finding (via breakdown_labels → category)

  const labels = sc.breakdown_labels || {};

  const sevs   = sc.breakdown_severity || {};

  const breakdown = sc.breakdown || {};



  const jumpToFinding = (findingId) =>

    `document.querySelector('[data-tab=\\'audit\\']').click();setTimeout(()=>document.getElementById('chapter-${findingId.toLowerCase()}')?.scrollIntoView({behavior:'smooth',block:'start'}),180);`;



  const rowColor = (v) => v <= 4 ? 'red' : v <= 6 ? 'amber' : 'green';



  // Sort entries: critical first, then moderate, then low

  const sortedEntries = Object.entries(breakdown).sort((a, b) => {

    const sa = sevs[a[0]] || 'LOW', sb = sevs[b[0]] || 'LOW';

    const order = { HIGH:0, MEDIUM:1, LOW:2 };

    if (order[sa] !== order[sb]) return order[sa] - order[sb];

    return a[1] - b[1];

  });



  // Build rows with dividers between severity groups

  // Gaps (HIGH/MEDIUM) get G01, G02… Strengths (LOW positive) get S01, S02…

  let lastSev = null;

  let gCount = 0, sCount = 0;

  const rows = sortedEntries.map(([key, val]) => {

    const label   = labels[key] || key.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());

    const sev     = sevs[key] || 'LOW';

    const finding = catToFinding[label];

    const col     = rowColor(val);

    const hasLink = !!finding;

    // Positive findings are strengths (S), others are gaps (G)

    const isPositive = finding?.severity === 'positive' || (!finding && sev === 'LOW' && val >= 7);

    const num = isPositive

      ? `S${String(++sCount).padStart(2,'0')}`

      : `G${String(++gCount).padStart(2,'0')}`;



    let divider = '';

    if (sev !== lastSev) {

      const sevLabel = sev === 'HIGH' ? '🔴 Critical — needs immediate attention'

                     : sev === 'MEDIUM' ? '🟡 Moderate — improvement opportunities'

                     : '🟢 Strengths — working well';

      const divBg = sev === 'HIGH' ? 'rgba(220,38,38,0.08)' : sev === 'MEDIUM' ? 'rgba(217,119,6,0.08)' : 'rgba(5,150,105,0.08)';

      const divBorder = sev === 'HIGH' ? 'rgba(220,38,38,0.18)' : sev === 'MEDIUM' ? 'rgba(217,119,6,0.18)' : 'rgba(5,150,105,0.18)';

      divider = `<div class="toc-row toc-row--divider" style="background:${divBg};border-bottom:1px solid ${divBorder};"><span class="toc-divider-label">${sevLabel}</span></div>`;

      lastSev = sev;

    }



    const row = `<div class="toc-row ${hasLink ? '' : 'toc-row--no-finding'}"

      data-toc-key="${key}"

      ${hasLink ? `onclick="${jumpToFinding(finding.id)}" role="button" tabindex="0"` : ''}>

      <span class="toc-num">${num}</span>

      <span class="toc-area">${escHtml(label)}</span>

      <div class="toc-bar-track">

        <div class="toc-bar-fill toc-bar-fill--${col}" style="width:${val*10}%"></div>

      </div>

      <span class="toc-score toc-score--${col}">${val}/10</span>

      <span class="toc-sev toc-sev--${col}">${sev}</span>

      <span class="toc-arrow">${hasLink ? '→' : '✓'}</span>

    </div>`;



    return divider + row;

  });



  return `<section id="score-heatmap" class="audit-section">

    <div class="section-eyebrow">Search Audit · Table of Contents</div>

    <div class="section-title">10 Areas Evaluated</div>

    <p class="section-desc">Overall score: <strong>${s(sc.overall)}/10</strong> — ${escHtml(sc.verdict)} · Click any row to jump to that chapter.</p>

    <div class="toc-list">${rows.join('')}</div>

    <div class="grid-3" style="margin-bottom:8px;">

      ${[

        { label: 'Critical Gaps',  value: n(sc.critical_count),  color: 'var(--red)' },

        { label: 'Moderate Gaps',  value: n(sc.moderate_count),  color: 'var(--amber)' },

        { label: 'Overall Score',  value: s(sc.overall) + '/10', color: 'var(--blue)' },

      ].map(m => `<div class="card" style="text-align:center;">

        <div style="${T.h3};color:${m.color};">${m.value}</div>

        <div style="${T.bodySmMid14};text-transform:uppercase;letter-spacing:0.06em;margin-top:4px;">${m.label}</div>

      </div>`).join('')}

    </div>

  </section>`;

}

function sectionSignals(D) {

  // Exclude 'hiring' type — hiring data lives in its own dedicated section (sectionHiring)

  // to avoid duplication. Hiring signals here would repeat the buying committee section.

  const signals = (D.intelligence_signals || []).filter(s => s.type !== 'hiring');

    <div class="section-title">Intelligence Signals</div>

    <p class="section-desc">No signals collected. Run /algolia-live-signals to populate hiring, social, and news signals.</p>

  </section>`;



  // Tier signals by urgency — ordering matters for visual impact

  const URGENCY_TIER = {

    'hiring':'1','news-leadership':'1','news-funding':'1',

    'exec':'2','competitor':'2','news-tech':'2','social-li':'2','social-x':'2',

    'media':'3','industry-risk':'3','news-launch':'3','news-international':'3',

    'industry-opp':'4','customer':'4','partner':'4',

  };

  const PLATFORM_ICON = {

    'social-li': `<svg width="14" height="14" viewBox="0 0 24 24" fill="var(--linkedin)"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`,

    'social-x':  `<svg width="14" height="14" viewBox="0 0 24 24" fill="#000"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.735-8.835L1.254 2.25H8.08l4.259 5.626 5.905-5.626zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,

  };



  const sorted = [...signals].sort((a,b) => {

    const ta = URGENCY_TIER[a.type] || '5';

    const tb = URGENCY_TIER[b.type] || '5';

    return ta.localeCompare(tb);

  });



  // Group into tiers for visual hierarchy

  const tier1 = sorted.filter(s => URGENCY_TIER[s.type] === '1');

  const tier2 = sorted.filter(s => URGENCY_TIER[s.type] === '2');

  const tier3plus = sorted.filter(s => !['1','2'].includes(URGENCY_TIER[s.type]||'5'));



  const signalRow = (sig) => {

    const col = SIGNAL_COLORS[sig.type] || 'var(--mid)';

    const label = SIGNAL_LABELS[sig.type] || sig.type;

    const icon = PLATFORM_ICON[sig.type] || '';

    const hasUrl = sig.source_url && sig.source_url.startsWith('http');

    return `<div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">

      <!-- Type badge -->

      <span style="flex-shrink:0;display:inline-flex;align-items:center;gap:4px;

        background:${col}15;border:1px solid ${col}35;border-radius:6px;

        padding:3px 8px;font-size:12px;font-weight:600;color:${col};white-space:nowrap;margin-top:2px;">

        ${icon} ${escHtml(label)}

      </span>

      <!-- Content -->

      <div style="flex:1;min-width:0;">

        <div style="${T.title};line-height:1.4;margin-bottom:4px;">

          ${escHtml(sig.badge_label || sig.text?.slice(0,80) || '—')}

        </div>

        <div style="${T.bodySmMid};">

          ${escHtml(sig.relevance || '')}

        </div>

      </div>

      <!-- Source — always show, always clickable -->

      <div style="flex-shrink:0;text-align:right;min-width:100px;">

        ${hasUrl ? `<a href="${sig.source_url}" target="_blank"

          style="display:inline-flex;align-items:center;gap:4px;${T.labelBlue};text-decoration:none;padding:4px 0;"

          onmouseenter="this.style.textDecoration='underline'"

          onmouseleave="this.style.textDecoration='none'">

          ${escHtml(sig.source_name?.slice(0,25)||'Source')}

        </a>` : `<span style="${T.bodySmGray12};">${escHtml(sig.source_name||'—')}</span>`}

        ${sig.source_date ? `<div style="${T.bodySmGray12};margin-top:2px;">${escHtml(sig.source_date.slice(0,10))}</div>` : ''}

      </div>

    </div>`;

  };



  const renderGroup = (title, items, borderColor) => items.length ? `

    <div style="margin-bottom:28px;">

      <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.10em;

                  color:${borderColor};padding:8px 0 4px;border-bottom:2px solid ${borderColor};

                  margin-bottom:4px;">${title} (${items.length})</div>

      ${items.map(signalRow).join('')}

    </div>` : '';



  return `<section id="section-signals" class="audit-section">

    <div class="section-title">Intelligence Signals</div>

}

    const intro = note.split('(1)')[0].trim();

    const introHtml = intro ? `<p style="${T.bodySm};margin-bottom:8px;">${escHtml(intro)}</p>` : '';

    const items = numbered.map(item => {

      const text = item.replace(/^\(\d+\)\s/, '').replace(/;$/, '').trim();

      return `<li style="${T.bodySm};margin-bottom:4px;">${escHtml(text)}</li>`;

    }).join('');

}

  const criticals = findings.filter(f => f.severity === 'critical');

  const moderates = findings.filter(f => f.severity === 'moderate');

  const positives = findings.filter(f => f.severity === 'positive');

  let gn = 0, sn = 0;

  const fidToDisplay = {};

  const fidToSolution = {};

  [...criticals, ...moderates, ...positives].forEach(f => {

    const disp = f.severity === 'positive'

      ? `S${String(++sn).padStart(2,'0')}`

      : `G${String(++gn).padStart(2,'0')}`;

    fidToDisplay[f.id] = disp;

    fidToSolution[f.id] = f.algolia_solution || '';

  });



  const jumpToChapter = (fid) =>

    `event.preventDefault();document.querySelector('[data-tab=\\'audit\\']').click();setTimeout(()=>document.getElementById('chapter-${fid.toLowerCase()}')?.scrollIntoView({behavior:'smooth',block:'start'}),180);`;



  return `<section id="section-said-found" class="audit-section">

    <div class="section-eyebrow">Business Case · The Hook</div>

        <tbody>

            const fid = g.finding_id || '';

            const dispId = fidToDisplay[fid] || '';

            const solution = fidToSolution[fid] || g.algolia_angle || '';

            const cleanEvidence = (g.found_evidence||'').replace(/\s*Screenshot:\s*screenshots\/[\w\-\.]+\.png\.?/g,'').trim();

            return `<tr>

              <td style="vertical-align:top;padding:16px;">

                <div style="${T.italic};color:var(--gray);line-height:1.5;margin-bottom:8px;">"${escHtml(g.said_quote)}"</div>

                <div style="${T.bodySmGray12};">— ${escHtml(g.said_attr)}</div>

function sectionWhyNow(D) {

  const hir = D.hiring || {};

  const fin = D.financials || {};

  const vacantRole = (hir.buying_committee||[]).find(r=>r.status?.includes('OPEN'));

  // Build timing triggers from intelligence_signals (funding, exec, hiring types) + fallback

  const sigTriggers = (D.intelligence_signals||[])

    .filter(s => ['funding','exec','hiring','competitor','industry-opp'].includes(s.type))

    .slice(0, 3)

    .map(s => ({

      icon: s.type==='funding'?'🏦': s.type==='exec'?'💬': s.type==='hiring'?'👤': s.type==='competitor'?'⚠️':'📈',

      label: s.badge_label || s.type,

      detail: (s.text||'').slice(0, 160) + ((s.text||'').length > 160 ? '…' : ''),

      urgency: s.type==='exec'||s.type==='funding' ? 'high' : s.type==='competitor' ? 'medium' : 'positive',

      url: s.source_url

    }));

  const vacantTrigger = vacantRole

    ? [{icon:'⚠️', label:'Technical Buyer Identified', detail:`${vacantRole.name||''} (${vacantRole.title||''}) — ${(vacantRole.message||'').slice(0,120)}`, urgency:'high', url:vacantRole.job_url}]

    : [];

  const berkshireTrigger = fin.berkshire_note

    ? [{icon:'🏦', label:'Financial Backing', detail:fin.berkshire_note.slice(0,160)+'…', urgency:'positive'}]

    : [];

  const triggers = [...vacantTrigger, ...sigTriggers, ...berkshireTrigger].slice(0, 4);

  const urgCol = {high:'var(--red)',medium:'var(--amber)',positive:'var(--green)'};

  return `<section id="section-why-now" class="audit-section">

    <div class="section-eyebrow">Business Case · Timing</div>

    <div class="section-title">Why Act Now</div>

    <p class="section-desc">${triggers.length} timing signal${triggers.length!==1?'s':''} — act before these windows close.</p>

    <div class="feature-grid" style="grid-template-columns:repeat(2,1fr);">

      ${triggers.map(t=>{

        const urg = t.urgency || 'positive';

        const urgLabel = urg === 'high' ? 'HIGH' : urg === 'medium' ? 'MEDIUM' : 'POSITIVE';

        return `<div class="feature-card feature-card--${urg}">

          <div class="fc-icon">

            <span style="${T.h5};">${t.icon}</span>

            <span style="${T.eyebrowSmCol(urgCol[urg]||'var(--mid)')};padding:2px 8px;border-radius:3px;background:${urgCol[urg]||'var(--mid)'}18;">${urgLabel}</span>

          </div>

          <div class="fc-title-row">

            <div class="fc-accent-bar"></div>

            <div class="fc-title">${escHtml(t.label)}</div>

          </div>

          <div class="fc-desc">${escHtml(t.detail)}</div>

          ${t.url?`<div class="fc-source"><a href="${t.url}" target="_blank">View role →</a></div>`:''}

        </div>`;

      }).join('')}

    </div>

  </section>`;

}

function renderSections(D) {

  const content  = document.getElementById('content');

  const findings = D.findings || [];

  const criticalFindings = findings.filter(f => f.severity === 'critical');

  const moderateFindings = findings.filter(f => f.severity === 'moderate');

  const positiveFindings = findings.filter(f => f.severity === 'positive');



  /* ── TAB 1: OVERVIEW ─────────────────────────── */

  const overviewHTML = sectionExecSummary(D); // Score by Dimension is embedded inside exec summary



  /* ── TAB 2: COMPANY INTEL ────────────────────── */

  // Digital Presence tile — Tech Stack + Traffic as one chapter

  // CSS in algolia-brand.css: .dp-tile strips .audit-section margin-bottom,

  // adds green gradient, consistent padding, section divider between them.

  const digitalPresenceTile = `<div class="dp-tile">

    ${sectionTechStack(D)}

    ${sectionTraffic(D)}

  </div>`;



  const intelHTML = [

    sectionCompanySnapshot(D),

    sectionFinancials(D),

    digitalPresenceTile,

    sectionHiring(D),

    sectionSignals(D),

  ].join('');



  /* ── TAB 3: SEARCH AUDIT ─────────────────────── */

  // Gaps (critical + moderate) → G01, G02…  Strengths (positive) → S01, S02…

  const allFindingsOrdered = [...criticalFindings, ...moderateFindings, ...positiveFindings];

  let gNum = 0, sNum = 0;

  const auditHTML = [

    sectionScoreHeatmap(D),

    ...allFindingsOrdered.map(f => {

      const isStrength = f.severity === 'positive';

      const displayId = isStrength

        ? `S${String(++sNum).padStart(2,'0')}`

        : `G${String(++gNum).padStart(2,'0')}`;

      return sectionFinding(f, displayId);

    }),

    sectionAppendixQueries(D),

  ].join('');



  /* ── TAB 4: BUSINESS CASE ────────────────────── */

  const caseHTML = [

    sectionBusinessCaseHook(D),

    sectionCompetitiveSynthesis(D),

    sectionRevenueAtRisk(D),

    sectionCaseStudies(D),

    sectionWhyNow(D),

    sectionStrategicAngles(D),

  ].join('');



  /* ── TAB 5: SALES PLAY ───────────────────────── */

  const playHTML = [

    sectionPreCallBrief(D),

    sectionBuyingCommittee(D),

    sectionBattleCard(D),

    sectionDiscoveryObjections(D),

    sectionOutreachPlan(D),

    sectionSources(D),

  ].join('');



  content.innerHTML = `

    <div id="group-overview" class="section-group tab-active" data-tab="overview">${overviewHTML}</div>

    <div id="group-intel"    class="section-group" data-tab="intel">${intelHTML}</div>

    <div id="group-audit"    class="section-group" data-tab="audit">${auditHTML}</div>

    <div id="group-case"     class="section-group" data-tab="case">${caseHTML}</div>

    <div id="group-play"     class="section-group" data-tab="play">${playHTML}</div>`;

}

function initTabRail() {

  const tabBtns = document.querySelectorAll('#tab-rail .tab-btn');

  const groups  = document.querySelectorAll('.section-group[data-tab]');



  function showTab(tabId) {

    tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));

    groups.forEach(g => {

      g.classList.toggle('tab-active', g.dataset.tab === tabId);

    });

    window.scrollTo({ top: 0, behavior: 'instant' });

    sessionStorage.setItem('spa-tab', tabId);

  }



  tabBtns.forEach(b => b.addEventListener('click', () => showTab(b.dataset.tab)));



  // Restore tab from session (useful on page reload)

  const saved = sessionStorage.getItem('spa-tab');

  if (saved && document.querySelector(`[data-tab="${saved}"]`)) showTab(saved);

}

function initSectionTabs() {

  document.addEventListener('click', e => {

    if (!btn) return;

    const section = btn.closest('.audit-section');

    if (!section) return;

    const paneId = btn.dataset.pane;

    section.querySelectorAll('.section-tab').forEach(t =>

      t.classList.toggle('active', t.dataset.pane === paneId));

    section.querySelectorAll('.section-tab-pane').forEach(p =>

      p.classList.toggle('active', p.dataset.pane === paneId));

}

function initCmdK(D) {

  const overlay  = document.getElementById('cmdK-overlay');

  const input    = document.getElementById('cmdK-input');

  const results  = document.getElementById('cmdK-results');

  const trigger  = document.getElementById('cmdK-trigger');

  if (!overlay) return;



  // Build search index

  const INDEX = [];

  const push  = (icon, text, hint, action) => INDEX.push({ icon, text, hint, action });



  // Tabs

  const tabMap = { overview: 'Overview', intel: 'Company Intel', audit: 'Search Audit', case: 'Business Case', play: 'Sales Play' };

  Object.entries(tabMap).forEach(([id, label]) =>

    push('⊞', label, 'Tab', () => {

      document.querySelector(`[data-tab="${id}"]`)?.click();

    })

  );



  // Findings

  (D.findings || []).forEach(f => {

    const icon = f.severity === 'critical' ? '🔴' : f.severity === 'positive' ? '🟢' : '🟡';

    push(icon, f.title, f.id, () => {

      document.querySelector('[data-tab="audit"]')?.click();

      setTimeout(() => document.getElementById(`finding-${f.id.toLowerCase()}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);

    });

  });



  // Competitors

  (D.competitors || []).forEach(c =>

    push('⚔', c.name, 'Competitor', () => openDrawer('competitor', c))

  );



  // Execs

  (D.executives || []).forEach(e =>

    push('💬', e.name, 'Executive Quote', () => openDrawer('exec', e))

  );



  // Signals

  (D.intelligence_signals || []).slice(0, 5).forEach(s =>

    push('📡', s.text.slice(0, 60) + '…', 'Signal', () => {

      document.querySelector('[data-tab="case"]')?.click();

      setTimeout(() => document.getElementById('section-signals')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);

    })

  );



  // Key sections

  const sectionLinks = [

    ['💰', 'Financial Profile', 'section-financials', 'intel'],

    ['🏢', 'Company Snapshot', 'company-snapshot', 'intel'],

    ['👥', 'Hiring Intelligence', 'section-hiring', 'intel'],

    ['🥊', 'Competitive Analysis', 'section-competitive', 'case'],

    ['📊', 'Score Heatmap', 'section-heatmap', 'audit'],

    ['🎯', 'AE Action Brief', 'section-precall', 'play'],

    ['🔑', 'Discovery Questions', 'section-discovery', 'play'],

    ['🏆', 'Golden Angle — Competitive Intel', 'section-competitive', 'case'],

  ];

  sectionLinks.forEach(([icon, text, id, tab]) =>

    push(icon, text, 'Section', () => {

      document.querySelector(`[data-tab="${tab}"]`)?.click();

      setTimeout(() => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);

    })

  );



  function fuzzy(query, text) {

    const q = query.toLowerCase(); const t = text.toLowerCase();

    if (t.includes(q)) return true;

    let qi = 0;

    for (let i = 0; i < t.length && qi < q.length; i++) {

      if (t[i] === q[qi]) qi++;

    }

    return qi === q.length;

  }



  let activeIdx = -1;

  function renderResults(query) {

    activeIdx = -1;

    const items = query.trim()

      ? INDEX.filter(i => fuzzy(query, i.text) || fuzzy(query, i.hint))

      : INDEX.slice(0, 12);



    if (!items.length) {

      results.innerHTML = `<div id="cmdK-empty">No results for "<strong>${escHtml(query)}</strong>"</div>`;

      return;

    }

    results.innerHTML = items.map((item, idx) =>

      `<button class="cmdK-item" data-idx="${idx}">

        <span class="cmdK-item__icon">${item.icon}</span>

        <span class="cmdK-item__text">${escHtml(item.text)}</span>

        <span class="cmdK-item__hint">${escHtml(item.hint)}</span>

      </button>`

    ).join('');



    results.querySelectorAll('.cmdK-item').forEach((el, idx) => {

      el.addEventListener('click', () => { items[idx].action(); close(); });

    });

    // Store filtered items for keyboard nav

    results._items = items;

  }



  function moveCursor(dir) {

    const btns = results.querySelectorAll('.cmdK-item');

    if (!btns.length) return;

    btns[activeIdx]?.classList.remove('cmdK-active');

    activeIdx = Math.max(0, Math.min(btns.length - 1, activeIdx + dir));

    btns[activeIdx]?.classList.add('cmdK-active');

    btns[activeIdx]?.scrollIntoView({ block: 'nearest' });

  }



  function open() {

    overlay.classList.add('open');

    input.value = '';

    renderResults('');

    input.focus();

  }

  function close() {

    overlay.classList.remove('open');

    input.blur();

  }



  trigger?.addEventListener('click', open);

  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

  input.addEventListener('input', e => renderResults(e.target.value));

  input.addEventListener('keydown', e => {

    if (e.key === 'ArrowDown')  { e.preventDefault(); moveCursor(1); }

    if (e.key === 'ArrowUp')    { e.preventDefault(); moveCursor(-1); }

    if (e.key === 'Enter') {

      const active = results.querySelector('.cmdK-active');

      active?.click();

    }

    if (e.key === 'Escape') close();

  });

  document.addEventListener('keydown', e => {

    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); open(); }

  });

}



/* ═══════════════════════════════════════════════════

   RIGHT DRAWER  — item-level detail

═══════════════════════════════════════════════════ */

      </div>

      <div style="margin-bottom:16px;">

        <div style="${T.bodySmMid14};margin-bottom:4px;">Search Vendor</div>

        <div style="${T.label15Col((data.search_vendor||'').includes('Algolia') ? 'var(--green)' : 'var(--red)')}">${escHtml(data.search_vendor || '—')}</div>

      </div>

      <div style="margin-bottom:16px;">

        <div style="${T.bodySmMid14};margin-bottom:6px;">Notes</div>

  } else if (type === 'exec') {

      <div style="${T.bodySmMid14};margin-bottom:16px;">

        ${data.quote_source ? `<a href="${data.quote_source}" target="_blank" style="color:var(--blue);">Source</a>` : ''}

        ${data.quote_date ? ` · ${data.quote_date}` : ''}

      </div>

      <div style="${T.bodySm};padding:10px 12px;background:var(--light);border-radius:6px;">${escHtml(data.relevance || '')}</div>`;

  }



  drawer.classList.add('open');

  overlay.classList.add('open');

}



function initDragPill() {

  const pill = document.getElementById('tab-rail');

  if (!pill) return;



  let dragging = false, startX, startY, originLeft, originTop;



  // Show grab cursor on the pill background (not on buttons)

  pill.style.cursor = 'grab';



  pill.addEventListener('mousedown', e => {

    if (e.target.closest('.tab-btn') || e.target.closest('.tab-rail-cmdK')) return;

    dragging = true;

    const rect = pill.getBoundingClientRect();

    startX = e.clientX; startY = e.clientY;

    originLeft = rect.left; originTop = rect.top;

    pill.style.cursor = 'grabbing';

    pill.style.transition = 'none';

    pill.style.transform = 'none';

    pill.style.left = originLeft + 'px';

    pill.style.top  = originTop  + 'px';

    e.preventDefault();

  });



  document.addEventListener('mousemove', e => {

    if (!dragging) return;

    const nx = originLeft + (e.clientX - startX);

    const ny = originTop  + (e.clientY - startY);

    const pw = pill.offsetWidth, ph = pill.offsetHeight;

    pill.style.left = Math.max(8, Math.min(nx, window.innerWidth  - pw - 8)) + 'px';

    pill.style.top  = Math.max(8, Math.min(ny, window.innerHeight - ph - 8)) + 'px';

  });



  document.addEventListener('mouseup', () => {

    if (!dragging) return;

    dragging = false;

    pill.style.cursor = 'grab';

    pill.style.transition = '';

    sessionStorage.setItem('pill-xy', JSON.stringify({ l: pill.style.left, t: pill.style.top }));

  });



  // Restore position across tab switches

  const saved = sessionStorage.getItem('pill-xy');

  if (saved) {

    try {

      const { l, t } = JSON.parse(saved);

      pill.style.transform = 'none';

      pill.style.left = l; pill.style.top = t;

    } catch(e) {}

  }

}



function initDrawer() {

  const close   = () => {

    document.getElementById('drawer')?.classList.remove('open');

    document.getElementById('drawer-overlay')?.classList.remove('open');

  };

  document.getElementById('drawer-close')?.addEventListener('click', close);

  document.getElementById('drawer-overlay')?.addEventListener('click', close);

  document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

}



/* ═══════════════════════════════════════════════════

   INIT

═══════════════════════════════════════════════════ */

function initFinTimeline() {

  const nodes  = Array.from(document.querySelectorAll('[data-tl-node]'));

  const fill   = document.getElementById('fin-fill');

  if (!nodes.length) return;



  // Stagger-reveal each node as it enters viewport

  const nodeObs = new IntersectionObserver(entries => {

    entries.forEach(entry => {

      if (entry.isIntersecting) {

        entry.target.classList.add('tl-node--visible');

        nodeObs.unobserve(entry.target);

      }

    });

  }, { threshold: 0.25 });

  nodes.forEach(n => nodeObs.observe(n));



  // Fill the vertical track as the section scrolls

  if (fill) {

    const trackEl = document.getElementById('fin-timeline');

    const scrollHandler = () => {

      if (!trackEl) return;

      const rect = trackEl.getBoundingClientRect();

      const winH = window.innerHeight;

      // pct = 0 when top of section at bottom of screen → 1 when bottom of section at top

      const pct = Math.min(1, Math.max(0, (winH - rect.top) / (winH + rect.height)));

      fill.style.height = (pct * 100) + '%';

    };

    window.addEventListener('scroll', scrollHandler, { passive: true });

    scrollHandler(); // run once on load

  }

}



function init() {

  const D = window.AUDIT_DATA;

  if (!D) return;



  renderTopbar(D);

  renderSections(D);



  requestAnimationFrame(() => {

    initTabRail();

    initDragPill();

    initSectionTabs();

    initCmdK(D);

    initDrawer();

    initLightbox();

    initFinTimeline();

    initChapterObserver();

    // Init animated background on all .ab-container elements

    document.querySelectorAll('.ab-container').forEach(el => initAnimatedBg(el));

    // Init interactive donut charts

    document.querySelectorAll('.donut-chart').forEach(el => initDonutChart(el.id));

    // Init glow on traffic KPI grid specifically

    const kpiGrid = document.getElementById('traffic-kpi-grid');

    if (kpiGrid) initGlowEffect(kpiGrid);

    // Init glow effect on all containers with .glow-card children

    document.querySelectorAll('[id$="-glow-grid"], .glow-grid').forEach(el => initGlowEffect(el));

    // Also init on direct parent containers of glow cards

    const glowCards = document.querySelectorAll('.glow-card');

    const glowParents = new Set([...glowCards].map(c => c.parentElement));

    glowParents.forEach(p => initGlowEffect(p));

  });



  // Scroll progress bar

  const progressBar = document.getElementById('scroll-progress');

  if (progressBar) {

    window.addEventListener('scroll', () => {

      const { scrollTop, scrollHeight, clientHeight } = document.documentElement;

      const pct = scrollHeight > clientHeight ? scrollTop / (scrollHeight - clientHeight) : 0;

      progressBar.style.transform = `scaleX(${pct})`;

    }, { passive: true });

  }



  // Keyboard: Cmd+P = print

  document.addEventListener('keydown', e => {

    if (e.key === 'p' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); window.print(); }

  });

}



/* ─── Chapter IntersectionObserver — highlights active TOC tile as you scroll ─── */

function initChapterObserver() {

  const chapters = document.querySelectorAll('.chapter-wrap[data-finding-id]');

  if (!chapters.length) return;



  // Build findingId → areaKey map from TOC tiles

  const findingToKey = {};

  document.querySelectorAll('.toc-tile[data-toc-key]').forEach(tile => {

    // Each tile's onclick contains the findingId — extract it

    const onclick = tile.getAttribute('onclick') || '';

    const m = onclick.match(/chapter-([a-z0-9]+)/i);

    if (m) findingToKey[m[1].toUpperCase()] = tile.dataset.tocKey;

  });



  const obs = new IntersectionObserver(entries => {

    entries.forEach(entry => {

      if (!entry.isIntersecting) return;

      const fid = entry.target.dataset.findingId;

      const key = findingToKey[fid];

      document.querySelectorAll('.toc-tile').forEach(t => t.classList.remove('active'));

      if (key) {

        const activeTile = document.querySelector(`.toc-tile[data-toc-key="${key}"]`);

        if (activeTile) activeTile.classList.add('active');

      }

    });

  }, { rootMargin: '-10% 0px -60% 0px' });



  chapters.forEach(ch => obs.observe(ch));

}



// Boot: inline scripts execute after DOMContentLoaded has already fired.

// Guard with readyState check so init() always runs.

function _boot() {

  initAnimatedGrid(); // Always run — independent of AUDIT_DATA

  if (window.AUDIT_DATA) {

    init();

  } else {

    const el = document.getElementById('no-data');

    if (el) el.style.display = 'flex';

  }

}

if (document.readyState === 'loading') {

  document.addEventListener('DOMContentLoaded', _boot);

} else {

  _boot();

}

</script>
